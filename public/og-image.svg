<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#080810"/>
      <stop offset="100%" style="stop-color:#13131A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6C63FF"/>
      <stop offset="100%" style="stop-color:#00D4AA"/>
    </linearGradient>
    <!-- Glow blobs -->
    <radialGradient id="blob1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#6C63FF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#6C63FF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00D4AA;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="240" cy="189" rx="400" ry="300" fill="url(#blob1)"/>
  <ellipse cx="960" cy="441" rx="350" ry="260" fill="url(#blob2)"/>

  <!-- Dot grid pattern (subtle) -->
  <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="rgba(255,255,255,0.04)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left accent bar -->
  <rect x="80" y="195" width="4" height="240" rx="2" fill="url(#accent)"/>

  <!-- Name / title -->
  <text x="112" y="264" font-family="Space Grotesk, Inter, sans-serif" font-size="64" font-weight="700" letter-spacing="-2" fill="#E8E8F0">Your Name</text>

  <!-- Role line -->
  <text x="114" y="318" font-family="JetBrains Mono, monospace" font-size="22" fill="#6C63FF">Developer  ·  JEE Aspirant  ·  AI Enthusiast</text>

  <!-- Description -->
  <text x="114" y="368" font-family="Inter, sans-serif" font-size="18" fill="#8888AA">Class 12 student building web apps and AI tools</text>
  <text x="114" y="394" font-family="Inter, sans-serif" font-size="18" fill="#8888AA">while preparing for JEE.</text>

  <!-- Bottom gradient line -->
  <rect x="80" y="448" width="480" height="2" rx="1" fill="url(#accent)"/>

  <!-- Tech badges -->
  <g transform="translate(114, 474)">
    <rect x="0" y="0" width="98" height="28" rx="14" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="49" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6C63FF">Next.js</text>
    <rect x="112" y="0" width="118" height="28" rx="14" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="171" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6C63FF">TypeScript</text>
    <rect x="244" y="0" width="82" height="28" rx="14" fill="rgba(108,99,255,0.15)" stroke="rgba(108,99,255,0.3)" stroke-width="1"/>
    <text x="285" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#6C63FF">Python</text>
    <rect x="340" y="0" width="72" height="28" rx="14" fill="rgba(0,212,170,0.12)" stroke="rgba(0,212,170,0.3)" stroke-width="1"/>
    <text x="376" y="18" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="12" fill="#00D4AA">AI/ML</text>
  </g>

  <!-- URL watermark -->
  <text x="1120" y="600" text-anchor="end" font-family="JetBrains Mono, monospace" font-size="14" fill="rgba(136,136,170,0.5)">yourportfolio.vercel.app</text>
</svg>
